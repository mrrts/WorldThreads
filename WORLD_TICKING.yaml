world_ticking:
  purpose: "Simulate off-screen life with minimal tokens: event summaries + state patches + hooks."

  triggers:
    after_user_message:
      enabled: true
      max_frequency: "1_per_user_message"
    switch_character:
      enabled: true
      debounce_seconds: 5
    location_or_time_change:
      enabled: true
    idle_tick:
      enabled: optional
      min_interval_minutes: 60
      only_when_app_focused: false

  inputs:
    include:
      - world_state_snapshot_compact
      - character_state_compact_for_all_characters
      - recent_world_events: { max: 8 }
      - last_user_message: { include: true, max_chars: 800 }
    exclude:
      - any_full_hidden_dialogue
      - long raw transcripts

  outputs:
    format: "strict_json"
    events:
      max_items: 3
      max_sentences_each: 2
    state_patch:
      max_ops: 12
      patch_style: "dotpath_numeric_or_enum_updates"
    hooks:
      max_items: 3
      max_chars_each: 120

  caching:
    enabled: true
    cache_key_hash_over:
      - world_state_snapshot_compact
      - character_state_compact_for_all_characters
      - ids_of_recent_world_events
      - last_user_message_id
    on_cache_hit: "skip_tick"

  safety_and_canon:
    rules:
      - "World ticks must not introduce major new lore unless prompted by user actions or existing arcs."
      - "Prefer small consequences over big twists."
      - "If uncertain, emit fewer events and fewer patch ops."

  model_tiering:
    recommended:
      world_tick_model: "cheaper_model"
      dialogue_model: "higher_quality_model"
      embeddings_model: "embedding_model"
