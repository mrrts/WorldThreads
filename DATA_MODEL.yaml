# Logical data model (implementation may map to SQLite tables + JSON columns)

world:
  world_id: "default"
  bible:
    description: "User-authored setting + rules + tone"
    tone_tags: ["cozy", "mysterious"] # optional
    invariants:
      - "Magic exists but is subtle."
      - "Characters cannot read the user's mind."
  state:
    time:
      day_index: 12
      time_of_day: "DUSK" # enum e.g. DAWN/MORNING/NOON/AFTERNOON/DUSK/NIGHT
    location:
      current_scene: "pier"
    global_arcs:
      - arc_id: "lighthouse-map"
        status: "ACTIVE"
        notes: "Map is torn; someone is hiding a corner."
    facts:
      # Stable truths promoted to canon; should be small and curated
      - fact_id: "world_fact_001"
        text: "The lighthouse keeper disappeared three years ago."
        confidence: "HIGH"

characters:
  - character_id: "mara"
    display_name: "Mara"
    canon_sheet:
      identity: "..."
      voice_rules: ["...", "..."]
      boundaries: ["..."]
      backstory_facts: ["..."]
      relationship_with_user:
        - "..."
      relationship_with_other_characters:
        - other_character_id: "ion"
          summary: "..."
    state:
      mood: 0.2 # -1..+1
      trust_user: 0.6 # 0..1
      trust_ion: 0.4 # 0..1
      goals: ["intercept_user_at_pier"] # short strings
      open_loops: ["ask_user_about_map"]
      last_seen:
        day_index: 12
        time_of_day: "AFTERNOON"
  - character_id: "ion"
    display_name: "Ion"
    canon_sheet: {}
    state: {}

threads:
  # One continuous thread per character
  - thread_id: "thread_mara"
    character_id: "mara"
  - thread_id: "thread_ion"
    character_id: "ion"

messages:
  # Append-only
  fields:
    message_id: "uuid"
    thread_id: "thread_mara|thread_ion"
    role: "user|assistant"
    created_at: "timestamp"
    content: "string"
    attachments: [] # optional future
    tokens_estimate: 0 # optional bookkeeping

world_events:
  # Append-only compact summaries produced by world ticks
  fields:
    event_id: "uuid"
    created_at: "timestamp"
    day_index: 12
    time_of_day: "DUSK"
    summary: "1-3 sentences"
    involved_characters: ["mara", "ion"]
    hooks: ["..."] # small strings
    provenance:
      trigger: "after_user_message|switch_character|location_change|idle_tick"

memory_artifacts:
  # Derived, editable, with provenance to messages/events
  types:
    - thread_summary
    - character_memory_facts
    - user_profile_facts
    - retrieval_chunk
  fields:
    artifact_id: "uuid"
    type: "..."
    subject_id: "thread_id|character_id|world_id"
    content: "string|json"
    sources: ["message_id|event_id"]
    updated_at: "timestamp"

retrieval_indexes:
  fts:
    enabled: true
  vectors:
    enabled: false
    embedding_model: "BYOK"
    chunking:
      target_tokens: 200
      overlap_tokens: 40
