# Push tag v* (e.g. v1.2.0) to publish installers on GitHub Releases.
#
# macOS signing + notarization (repository secrets — Settings → Secrets and variables → Actions):
#   APPLE_CERTIFICATE          base64-encoded .p12 (Developer ID Application)
#   APPLE_CERTIFICATE_PASSWORD password for that .p12 export
#   KEYCHAIN_PASSWORD          arbitrary string for the ephemeral CI keychain
#   APPLE_ID                   Apple ID email (notarization)
#   APPLE_PASSWORD             app-specific password (appleid.apple.com → Sign-In and Security)
#   APPLE_TEAM_ID              Team ID from developer.apple.com membership details
#
name: Desktop release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix frontend
          npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            pkg-config \
            build-essential

      - name: Import Apple Developer ID certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: ./scripts/ci/macos-import-cert-for-tauri.sh

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: WorldThreads ${{ github.ref_name }}
          releaseBody: |
            Installers for macOS (.dmg), Windows (.msi / .exe), and Linux (.deb / .AppImage / .rpm).

            **macOS** builds are Developer ID signed and notarized when repository secrets are configured.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
